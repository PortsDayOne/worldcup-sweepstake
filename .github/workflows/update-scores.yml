name: Auto-update World Cup scores

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run score updater
        env:
          FD_API_KEY: ${{ secrets.FD_API_KEY }}
        run: python scripts/update_scores.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sweepstake-site/src/data.js sweepstake-site/src/groups.js sweepstake-site/src/SweepstakeDashboard.jsx
          git diff --staged --quiet || git commit -m "Auto-update scores"
          git push
